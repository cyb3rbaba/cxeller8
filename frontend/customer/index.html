<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0c0c10;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff5;
    --muted: rgba(240,239,245,0.45);
    --accent: #7c6dff;
    --accent2: #ff6b6b;
    --green: #4ade80;
    --chat-w: 520px;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Background orbs */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 30%, rgba(124,109,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 80% 70%, rgba(255,107,107,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Main container ── */
  .container {
    width: 100%;
    max-width: var(--chat-w);
    padding: 24px 16px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    justify-content: center;
  }

  /* ── Header ── */
  .app-header {
    text-align: center;
    margin-bottom: 20px;
    padding-top: 20px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #b06dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }

  .logo-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.4rem;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .online-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--green);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
  }

  .online-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Chat widget ── */
  .chat-widget {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 600px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,109,255,0.1);
  }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex;
    padding: 12px 12px 0;
    gap: 4px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 12px 12px 0 0;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    position: relative;
  }

  .tab-btn .tab-icon {
    font-size: 1.05rem;
    line-height: 1;
  }

  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .tab-btn.active {
    color: var(--text);
    background: var(--surface);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 12px; right: 12px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* ── Panels ── */
  .panel {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .panel.active { display: flex; }

  /* ── Messages ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .msg.bot, .msg.agent { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .msg.user .msg-row { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #b06dff);
    font-size: 0.85rem;
  }

  .msg.agent .msg-avatar {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    font-size: 0.75rem;
    font-weight: 700;
    color: #052e16;
  }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.6;
  }

  .msg.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.agent .msg-bubble {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.2);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Typing */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 15px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    align-self: flex-start;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Escalation card */
  .escalation-card {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 16px;
    align-self: flex-start;
    max-width: 88%;
    animation: msgIn 0.25s ease-out;
  }

  .escalation-card p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .escalation-btns { display: flex; gap: 8px; flex-wrap: wrap; }

  .esc-btn {
    padding: 8px 14px;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .esc-btn.chat { background: var(--accent); color: white; }
  .esc-btn.chat:hover { filter: brightness(1.15); }
  .esc-btn.voice { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
  .esc-btn.voice:hover { background: rgba(255,107,107,0.25); }

  /* ── Input area ── */
  .input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  .msg-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 24px;
    max-height: 100px;
    line-height: 1.5;
    padding: 4px 0;
  }

  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Live chat banner ── */
  .live-banner {
    padding: 10px 18px;
    font-size: 0.78rem;
    font-weight: 500;
    background: rgba(124,109,255,0.08);
    border-bottom: 1px solid rgba(124,109,255,0.15);
    color: rgba(124,109,255,0.9);
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Voice panel ── */
  .voice-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px 24px;
  }

  .call-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), #ff4d4d);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    box-shadow: 0 0 0 0 rgba(255,107,107,0.4);
    animation: callRing 2.5s infinite;
    transition: all 0.3s;
  }

  .call-avatar.in-call {
    background: linear-gradient(135deg, var(--green), #22c55e);
    box-shadow: 0 0 0 0 rgba(74,222,128,0.4);
    animation: callRingGreen 2.5s infinite;
  }

  @keyframes callRing {
    0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    70% { box-shadow: 0 0 0 24px rgba(255,107,107,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
  }

  @keyframes callRingGreen {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    70% { box-shadow: 0 0 0 24px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  .call-info { text-align: center; }

  .call-info h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }

  .call-info p { font-size: 0.85rem; color: var(--muted); }

  #call-timer {
    font-family: 'Instrument Serif', serif;
    font-size: 2.8rem;
    letter-spacing: 0.04em;
    color: var(--green);
  }

  .queue-badge {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 12px 24px;
    text-align: center;
  }

  .queue-badge .num {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    color: var(--text);
    display: block;
  }

  .queue-badge .label { font-size: 0.75rem; color: var(--muted); }

  /* Call buttons */
  .call-btn-group { display: flex; gap: 14px; align-items: center; }

  .call-action-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 50px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .call-action-btn .btn-icon { font-size: 1.2rem; }

  .call-action-btn.start {
    background: linear-gradient(135deg, #ff6b6b, #ff4d4d);
    color: white;
    box-shadow: 0 4px 20px rgba(255,107,107,0.35);
  }

  .call-action-btn.start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,107,0.45); }
  .call-action-btn.start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .call-ctrl-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .call-ctrl-btn:hover { transform: scale(1.1); }
  .call-ctrl-btn.mute { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); }
  .call-ctrl-btn.mute.muted { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.3); color: var(--accent2); }
  .call-ctrl-btn.end-call { background: #ef4444; color: white; }

  /* ── Name modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 40px 36px;
    width: 360px;
    max-width: 92vw;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    text-align: center;
    animation: modalIn 0.3s ease-out;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  .modal-emoji { font-size: 2.4rem; margin-bottom: 16px; }

  .modal-card h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.7rem;
    margin-bottom: 6px;
  }

  .modal-card p { font-size: 0.875rem; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .start-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .start-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

  audio { display: none; }

  /* End chat button */
  .end-chat-btn {
    width: 100%;
    padding: 10px;
    background: rgba(239,68,68,0.1);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }

  .end-chat-btn:hover { background: rgba(239,68,68,0.2); }

  @media (max-width: 560px) {
    .container { padding: 12px 8px; }
    .chat-widget { height: 100vh; border-radius: 0; border: none; }
    .tab-btn span.tab-label { display: none; }
  }
</style>
</head>
<body>

<!-- Name Modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal-card">
    <div class="modal-emoji">👋</div>
    <h2>Welcome to Nexus</h2>
    <p>Let us know your name so we can personalise your support experience.</p>
    <input class="name-input" id="customer-name-input" placeholder="Your name…" autofocus>
    <button class="start-btn" id="start-btn">Start Conversation →</button>
  </div>
</div>

<div class="container">
  <!-- Header -->
  <div class="app-header">
    <div class="logo-mark">
      <div class="logo-icon">✦</div>
      <span class="logo-name">Nexus Support</span>
    </div>
    <br>
    <span class="online-badge"><span class="dot"></span> Agents Online</span>
  </div>

  <!-- Chat Widget -->
  <div class="chat-widget">
    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-bot" onclick="switchTab('bot')">
        <span class="tab-icon">🤖</span>
        <span class="tab-label">AI Chat</span>
      </button>
      <button class="tab-btn" id="tab-live" onclick="switchTab('live')">
        <span class="tab-icon">💬</span>
        <span class="tab-label">Live Chat</span>
      </button>
      <button class="tab-btn" id="tab-voice" onclick="switchTab('voice')">
        <span class="tab-icon">📞</span>
        <span class="tab-label">Voice Call</span>
      </button>
    </div>

    <!-- Bot Chat Panel -->
    <div class="panel active" id="panel-bot">
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="msg-input" id="msg-input" placeholder="Ask me anything…" rows="1"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>

    <!-- Live Chat Panel -->
    <div class="panel" id="panel-live">
      <div class="live-banner" id="live-banner">🔄 Connecting to an agent…</div>
      <div class="messages-area" id="live-messages-area"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="msg-input" id="live-msg-input" placeholder="Message your agent…" rows="1"></textarea>
          <button class="send-btn" onclick="sendLiveMessage()">↑</button>
        </div>
        <button class="end-chat-btn" id="end-chat-btn" style="display:none" onclick="endLiveChat()">End Chat Session</button>
      </div>
    </div>

    <!-- Voice Call Panel -->
    <div class="panel" id="panel-voice">
      <div class="voice-panel">
        <div class="call-avatar" id="call-avatar">📞</div>

        <div class="call-info">
          <h3 id="call-status-text">Ready to call</h3>
          <p id="call-sub-text">Speak directly with a live support agent</p>
        </div>

        <div id="call-timer-display" style="display:none">
          <div id="call-timer">00:00</div>
        </div>

        <div class="queue-badge" id="queue-badge" style="display:none">
          <span class="num" id="queue-pos">—</span>
          <span class="label">Position in queue</span>
        </div>

        <!-- Start call button -->
        <div id="call-start-group">
          <button class="call-action-btn start" id="request-call-btn" onclick="requestVoiceCall()">
            <span class="btn-icon">📞</span> Call a Live Agent
          </button>
        </div>

        <!-- Active call controls -->
        <div class="call-btn-group" id="active-call-controls" style="display:none">
          <button class="call-ctrl-btn mute" id="mute-btn" onclick="toggleMute()" title="Mute">🎙️</button>
          <button class="call-ctrl-btn end-call" onclick="endCall()" title="End call">📵</button>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : window.location.origin;

let socket, customerName = '', sessionId = null;
let currentTab = 'bot';
let conversationHistory = [];
let isBotTyping = false;
let liveChatSessionId = null;

// WebRTC
let peerConnection = null;
let localStream = null;
let callId = null;
let callTimerInterval = null;
let callSeconds = 0;
let isMuted = false;
let mediaRecorder = null;
let recordedChunks = [];

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startSession);
document.getElementById('customer-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSession();
});
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('live-msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendLiveMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

function startSession() {
  const input = document.getElementById('customer-name-input');
  const name = input.value.trim();
  if (!name) { input.style.borderColor = '#ef4444'; return; }
  customerName = name;
  document.getElementById('name-modal').style.display = 'none';

  socket = io(API_URL, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('register:customer', { name: customerName });
  });

  socket.on('registered', (data) => { sessionId = data.sessionId; });

  socket.on('chat:queued', ({ position }) => {
    document.getElementById('live-banner').textContent = `⏳ Queue position: ${position}`;
    appendLiveMsg('system', `You're #${position} in queue. An agent will be with you shortly…`);
  });

  socket.on('chat:connected', ({ agentName, sessionId: sid }) => {
    liveChatSessionId = sid;
    const banner = document.getElementById('live-banner');
    banner.textContent = `✅ Connected with ${agentName}`;
    banner.style.background = 'rgba(74,222,128,0.08)';
    banner.style.borderColor = 'rgba(74,222,128,0.2)';
    banner.style.color = '#4ade80';
    document.getElementById('end-chat-btn').style.display = 'block';
    appendLiveMsg('system', `${agentName} has joined the chat`);
  });

  socket.on('chat:message', (msg) => {
    if (msg.sender === 'agent') appendLiveMsg('agent', msg.text);
  });

  socket.on('chat:ended', () => {
    appendLiveMsg('system', 'Chat session ended');
    document.getElementById('end-chat-btn').style.display = 'none';
    document.getElementById('live-banner').textContent = '❌ Chat ended';
  });

  socket.on('call:queued', ({ callId: cId, position }) => {
    callId = cId;
    document.getElementById('call-status-text').textContent = 'Waiting for an agent…';
    document.getElementById('call-sub-text').textContent = `Queue position: ${position}`;
    document.getElementById('queue-badge').style.display = 'block';
    document.getElementById('queue-pos').textContent = position;
  });

  socket.on('call:accepted', async ({ agentName }) => {
    document.getElementById('call-status-text').textContent = `Connecting with ${agentName}…`;
    document.getElementById('queue-badge').style.display = 'none';
    await initiatePeerConnection();
  });

  socket.on('webrtc:offer', async ({ callId: cId, offer, fromSocketId }) => {
    if (!peerConnection) await initiatePeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('webrtc:answer', { callId: cId, answer, targetSocketId: fromSocketId });
  });

  socket.on('webrtc:answer', async ({ answer }) => {
    if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('webrtc:ice-candidate', async ({ candidate }) => {
    if (peerConnection && candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
  });

  socket.on('call:active', () => {
    startCallTimer();
    document.getElementById('call-status-text').textContent = 'In Call';
    document.getElementById('call-sub-text').textContent = 'Connected with live agent';
    document.getElementById('call-start-group').style.display = 'none';
    document.getElementById('active-call-controls').style.display = 'flex';
    document.getElementById('call-timer-display').style.display = 'block';
    const avatar = document.getElementById('call-avatar');
    avatar.textContent = '🎙️';
    avatar.classList.add('in-call');
  });

  socket.on('call:ended', () => {
    cleanupCall();
    document.getElementById('call-status-text').textContent = 'Call Ended';
    document.getElementById('call-sub-text').textContent = 'Thank you for calling!';
    document.getElementById('active-call-controls').style.display = 'none';
    document.getElementById('call-start-group').style.display = 'block';
    document.getElementById('call-timer-display').style.display = 'none';
    const avatar = document.getElementById('call-avatar');
    avatar.textContent = '📞';
    avatar.classList.remove('in-call');
  });

  socket.on('call:rejected', () => {
    document.getElementById('call-status-text').textContent = 'No agents available';
    document.getElementById('call-sub-text').textContent = 'Please try again or use live chat';
    document.getElementById('request-call-btn').disabled = false;
  });

  appendMsg('bot', `Hi ${customerName}! 👋 I'm the Nexus AI assistant. How can I help you today?`);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['bot', 'live', 'voice'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'live' && socket && !liveChatSessionId) {
    socket.emit('chat:request', {});
  }
}

// ── Bot Chat ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const message = input.value.trim();
  if (!message || isBotTyping) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', message);
  conversationHistory.push({ role: 'user', content: message });

  showTyping();
  isBotTyping = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API_URL}/api/chat/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: conversationHistory }),
    });
    const data = await res.json();
    hideTyping();
    isBotTyping = false;
    document.getElementById('send-btn').disabled = false;
    conversationHistory.push({ role: 'assistant', content: data.message });
    appendMsg('bot', data.message);
    if (data.escalate) showEscalationOptions();
  } catch (err) {
    hideTyping();
    isBotTyping = false;
    document.getElementById('send-btn').disabled = false;
    appendMsg('bot', "I'm having connectivity issues. Please try again or switch to Live Chat.");
  }
}

function appendMsg(type, text) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (type === 'bot') {
    div.innerHTML = `
      <div class="msg-row">
        <div class="msg-avatar">✦</div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      </div>
      <div class="msg-time">${time}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-row">
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      </div>
      <div class="msg-time">${time}</div>`;
  }

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showEscalationOptions() {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = 'escalation-card';
  div.innerHTML = `
    <p>I'd recommend connecting you with a live agent for more personalised help.</p>
    <div class="escalation-btns">
      <button class="esc-btn chat" onclick="switchTab('live')">💬 Live Chat</button>
      <button class="esc-btn voice" onclick="switchTab('voice')">📞 Voice Call</button>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const area = document.getElementById('messages-area');
  typingEl = document.createElement('div');
  typingEl.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(typingEl);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── Live Chat ─────────────────────────────────────────────────────────────────
function appendLiveMsg(type, text) {
  const area = document.getElementById('live-messages-area');
  const div = document.createElement('div');
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (type === 'system') {
    div.style.cssText = 'text-align:center;font-size:0.75rem;color:rgba(240,239,245,0.35);font-style:italic;padding:4px 0;';
    div.textContent = text;
  } else {
    div.className = `msg ${type}`;
    const isAgent = type === 'agent';
    div.innerHTML = `
      <div class="msg-row">
        ${isAgent ? `<div class="msg-avatar" style="background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16;font-size:0.7rem;font-weight:700;">A</div>` : ''}
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      </div>
      <div class="msg-time">${time}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function sendLiveMessage() {
  const input = document.getElementById('live-msg-input');
  const message = input.value.trim();
  if (!message || !liveChatSessionId) return;
  input.value = '';
  socket.emit('chat:message', { sessionId: liveChatSessionId, message, sender: 'customer' });
  appendLiveMsg('user', message);
}

function endLiveChat() {
  if (liveChatSessionId) socket.emit('chat:end', { sessionId: liveChatSessionId });
}

// ── Voice Call ────────────────────────────────────────────────────────────────
async function requestVoiceCall() {
  if (!socket) { alert('Please wait for connection…'); return; }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    alert('Microphone access is required for voice calls. Please allow microphone access and try again.');
    return;
  }
  document.getElementById('request-call-btn').disabled = true;
  document.getElementById('call-status-text').textContent = 'Requesting call…';
  socket.emit('call:request', {});
}

async function initiatePeerConnection() {
  const iceRes = await fetch(`${API_URL}/api/ice-servers`);
  const { iceServers } = await iceRes.json();
  peerConnection = new RTCPeerConnection({ iceServers });
  if (localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
  peerConnection.onicecandidate = ({ candidate }) => {
    if (candidate && socket) socket.emit('webrtc:ice-candidate', { callId, candidate, targetSocketId: null });
  };
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') socket.emit('call:active', { callId });
  };
  try {
    if (localStream?.getTracks().length > 0) {
      const recStream = new MediaStream(localStream.getTracks());
      mediaRecorder = new MediaRecorder(recStream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.start(1000);
    }
  } catch (e) { console.warn('Recording setup failed:', e); }
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('muted', isMuted);
  btn.textContent = isMuted ? '🔇' : '🎙️';
}

function endCall() {
  socket.emit('call:end', { callId });
  uploadRecording();
  cleanupCall();
}

async function uploadRecording() {
  if (!mediaRecorder || recordedChunks.length === 0 || !callId) return;
  mediaRecorder.stop();
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('recording', blob, `call-${callId}.webm`);
  try {
    await fetch(`${API_URL}/api/calls/${callId}/recording`, { method: 'POST', body: formData });
  } catch (e) { console.warn('Recording upload failed:', e); }
}

function cleanupCall() {
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
  if (peerConnection) { peerConnection.close(); peerConnection = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  callSeconds = 0; recordedChunks = []; mediaRecorder = null;
  document.getElementById('request-call-btn').disabled = false;
}

function startCallTimer() {
  callSeconds = 0;
  callTimerInterval = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
    const s = String(callSeconds % 60).padStart(2, '0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}
</script>
