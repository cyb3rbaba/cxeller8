services:
  # ── Backend API + WebSocket server ──────────────────────────
  - type: web
    name: cxeller8
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://nexus-callcenter.onrender.com  # update with your URL
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false  # Set in Render dashboard
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: SUPABASE_URL
     value: llama
      - key: SUPABASE_ANON_KEY
        value: llama
      - key: SUPABASE_SERVICE_KEY
       value: llama
      - key: TURN_SERVER_URL
        sync: falxxse
      - key: TURN_USERNAME
       value: llama
      - key: TURN_CREDENTIAL
        value: llama

  # ── Frontend static sites ────────────────────────────────────
  - type: web
    name: nexus-customer
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: frontend/customer
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: true

  - type: web
    name: nexus-agent
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: frontend/agent

  - type: web
    name: nexus-supervisor
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: frontend/supervisor
