<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nexus Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0c0c10;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff5;
    --muted: rgba(240,239,245,0.45);
    --accent: #7c6dff;
    --red: #ff6b6b;
    --green: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 500px 350px at 15% 20%, rgba(124,109,255,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 350px 350px at 85% 80%, rgba(255,107,107,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 560px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .app-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #b06dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  .logo-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.15rem;
  }

  .online-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--green);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
  }

  .online-badge .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Messages ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .msg.user .msg-row { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #b06dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.6;
  }

  .msg.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-bottom-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Typing indicator */
  .typing-wrap { align-self: flex-start; }
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 11px 15px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── Resolved prompt ── */
  .resolved-prompt {
    align-self: flex-start;
    max-width: 88%;
    animation: msgIn 0.25s ease-out;
  }

  .resolved-prompt p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .resolved-btns {
    display: flex;
    gap: 8px;
  }

  .resolved-btn {
    padding: 8px 16px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }

  .resolved-btn.yes {
    background: rgba(74,222,128,0.12);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.25);
  }
  .resolved-btn.yes:hover { background: rgba(74,222,128,0.22); }

  .resolved-btn.no {
    background: rgba(255,107,107,0.12);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.25);
  }
  .resolved-btn.no:hover { background: rgba(255,107,107,0.22); }

  /* ── Escalation bar ── */
  .escalation-bar {
    display: none;
    flex-shrink: 0;
    padding: 14px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border2);
    gap: 10px;
  }

  .escalation-bar.visible { display: flex; }

  .escalation-bar p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 10px;
    text-align: center;
  }

  .escalation-bar-inner {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 8px;
  }

  .esc-btn {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .esc-btn-row { display: flex; gap: 8px; }

  .esc-btn.chat {
    background: var(--accent);
    color: white;
  }
  .esc-btn.chat:hover { filter: brightness(1.15); }

  .esc-btn.voice {
    background: rgba(255,107,107,0.12);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .esc-btn.voice:hover { background: rgba(255,107,107,0.22); }

  /* ── Input ── */
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  .msg-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 24px;
    max-height: 90px;
    line-height: 1.5;
    padding: 3px 0;
    -webkit-appearance: none;
  }

  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { filter: brightness(1.15); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Live chat panel ── */
  #live-panel {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #live-panel.active { display: flex; }

  .live-banner {
    padding: 10px 16px;
    font-size: 0.78rem;
    font-weight: 500;
    background: rgba(124,109,255,0.08);
    border-bottom: 1px solid rgba(124,109,255,0.15);
    color: rgba(160,148,255,0.9);
    flex-shrink: 0;
  }

  /* ── Voice panel ── */
  #voice-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 24px;
    padding: 32px 24px;
  }

  #voice-panel.active { display: flex; }

  .call-avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--red), #ff4d4d);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    animation: callRing 2.5s infinite;
  }

  .call-avatar.in-call {
    background: linear-gradient(135deg, var(--green), #22c55e);
    animation: callRingGreen 2.5s infinite;
  }

  @keyframes callRing {
    0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(255,107,107,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
  }

  @keyframes callRingGreen {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  .call-info { text-align: center; }
  .call-info h3 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; margin-bottom: 5px; }
  .call-info p { font-size: 0.83rem; color: var(--muted); }

  #call-timer {
    font-family: 'Instrument Serif', serif;
    font-size: 2.6rem;
    color: var(--green);
  }

  .call-btn-row { display: flex; gap: 14px; }

  .call-action-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 13px 26px;
    border-radius: 50px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--red), #ff4d4d);
    color: white;
    box-shadow: 0 4px 18px rgba(255,107,107,0.3);
  }

  .call-action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,107,0.4); }
  .call-action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.25rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .ctrl-btn.mute { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); }
  .ctrl-btn.mute.muted { background: rgba(255,107,107,0.15); color: var(--red); }
  .ctrl-btn.end { background: #ef4444; color: white; }
  .ctrl-btn:hover { transform: scale(1.08); }

  /* back button */
  .back-btn {
    align-self: flex-start;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  /* ── Name modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    animation: modalIn 0.28s ease-out;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .modal-emoji { font-size: 2.2rem; margin-bottom: 14px; }
  .modal-card h2 { font-family: 'Instrument Serif', serif; font-size: 1.6rem; margin-bottom: 6px; }
  .modal-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 15px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .start-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .start-btn:hover { filter: brightness(1.12); }

  audio { display: none; }
</style>
</head>
<body>

<!-- Name Modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal-card">
    <div class="modal-emoji">👋</div>
    <h2>Welcome to Nexus</h2>
    <p>Tell us your name so we can personalise your experience.</p>
    <input class="name-input" id="customer-name-input" placeholder="Your name…" autofocus>
    <button class="start-btn" id="start-btn">Start Conversation →</button>
  </div>
</div>

<div class="app">
  <!-- Header -->
  <div class="app-header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-name">Nexus Support</span>
    </div>
    <span class="online-badge"><span class="dot"></span> Online</span>
  </div>

  <!-- Bot chat -->
  <div id="bot-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="messages-area" id="messages-area"></div>

    <!-- Escalation bar (shown only when unresolved) -->
    <div class="escalation-bar" id="escalation-bar">
      <div class="escalation-bar-inner">
        <p>Connect with a real person</p>
        <div class="esc-btn-row">
          <button class="esc-btn chat" onclick="showLiveChat()">💬 Live Chat</button>
          <button class="esc-btn voice" onclick="showVoiceCall()">📞 Call a Live Agent</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msg-input" placeholder="Ask me anything…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <!-- Live chat panel -->
  <div id="live-panel">
    <div class="live-banner" id="live-banner">🔄 Connecting to an agent…</div>
    <div class="messages-area" id="live-messages-area"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="live-msg-input" placeholder="Message your agent…" rows="1"></textarea>
        <button class="send-btn" onclick="sendLiveMessage()">↑</button>
      </div>
      <button id="end-chat-btn" style="display:none;width:100%;margin-top:10px;padding:10px;background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);border-radius:10px;font-family:Outfit,sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;" onclick="endLiveChat()">End Chat Session</button>
    </div>
  </div>

  <!-- Voice panel -->
  <div id="voice-panel">
    <button class="back-btn" onclick="backToBot()">← Back</button>
    <div class="call-avatar" id="call-avatar">📞</div>
    <div class="call-info">
      <h3 id="call-status-text">Ready to call</h3>
      <p id="call-sub-text">Speak directly with a live support agent</p>
    </div>
    <div id="call-timer-display" style="display:none"><div id="call-timer">00:00</div></div>
    <div id="queue-badge" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 24px;text-align:center;">
      <span style="font-family:'Instrument Serif',serif;font-size:1.8rem;display:block" id="queue-pos">—</span>
      <span style="font-size:0.72rem;color:var(--muted)">Position in queue</span>
    </div>
    <div id="call-start-group">
      <button class="call-action-btn" id="request-call-btn" onclick="requestVoiceCall()">
        📞 Call a Live Agent
      </button>
    </div>
    <div class="call-btn-row" id="active-call-controls" style="display:none">
      <button class="ctrl-btn mute" id="mute-btn" onclick="toggleMute()">🎙️</button>
      <button class="ctrl-btn end" onclick="endCall()">📵</button>
    </div>
  </div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : window.location.origin;

let socket, customerName = '', sessionId = null;
let conversationHistory = [];
let isBotTyping = false;
let liveChatSessionId = null;
let escalationShown = false;

// WebRTC
let peerConnection = null, localStream = null, callId = null;
let callTimerInterval = null, callSeconds = 0, isMuted = false;
let mediaRecorder = null, recordedChunks = [];

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startSession);
document.getElementById('customer-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSession();
});
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('live-msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendLiveMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 90) + 'px';
});

function startSession() {
  const input = document.getElementById('customer-name-input');
  const name = input.value.trim();
  if (!name) { input.style.borderColor = '#ef4444'; return; }
  customerName = name;
  document.getElementById('name-modal').style.display = 'none';

  socket = io(API_URL, { transports: ['websocket', 'polling'] });
  socket.on('connect', () => socket.emit('register:customer', { name: customerName }));
  socket.on('registered', d => { sessionId = d.sessionId; });

  // Live chat events
  socket.on('chat:queued', ({ position }) => {
    document.getElementById('live-banner').textContent = `⏳ Queue position: ${position}`;
    appendLiveMsg('system', `You're #${position} in queue. An agent will be with you shortly…`);
  });
  socket.on('chat:connected', ({ agentName, sessionId: sid }) => {
    liveChatSessionId = sid;
    const b = document.getElementById('live-banner');
    b.textContent = `✅ Connected with ${agentName}`;
    b.style.background = 'rgba(74,222,128,0.08)';
    b.style.borderColor = 'rgba(74,222,128,0.2)';
    b.style.color = '#4ade80';
    document.getElementById('end-chat-btn').style.display = 'block';
    appendLiveMsg('system', `${agentName} has joined the chat`);
  });
  socket.on('chat:message', msg => { if (msg.sender === 'agent') appendLiveMsg('agent', msg.text); });
  socket.on('chat:ended', () => {
    appendLiveMsg('system', 'Chat session ended');
    document.getElementById('end-chat-btn').style.display = 'none';
  });

  // Voice events
  socket.on('call:queued', ({ callId: cId, position }) => {
    callId = cId;
    document.getElementById('call-status-text').textContent = 'Waiting for an agent…';
    document.getElementById('call-sub-text').textContent = `Queue position: ${position}`;
    document.getElementById('queue-badge').style.display = 'block';
    document.getElementById('queue-pos').textContent = position;
  });
  socket.on('call:accepted', async ({ agentName }) => {
    document.getElementById('call-status-text').textContent = `Connecting with ${agentName}…`;
    document.getElementById('queue-badge').style.display = 'none';
    await initiatePeerConnection();
  });
  socket.on('webrtc:offer', async ({ callId: cId, offer, fromSocketId }) => {
    if (!peerConnection) await initiatePeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('webrtc:answer', { callId: cId, answer, targetSocketId: fromSocketId });
  });
  socket.on('webrtc:answer', async ({ answer }) => {
    if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  });
  socket.on('webrtc:ice-candidate', async ({ candidate }) => {
    if (peerConnection && candidate) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
  });
  socket.on('call:active', () => {
    startCallTimer();
    document.getElementById('call-status-text').textContent = 'In Call';
    document.getElementById('call-sub-text').textContent = 'Connected with live agent';
    document.getElementById('call-start-group').style.display = 'none';
    document.getElementById('active-call-controls').style.display = 'flex';
    document.getElementById('call-timer-display').style.display = 'block';
    const av = document.getElementById('call-avatar');
    av.textContent = '🎙️'; av.classList.add('in-call');
  });
  socket.on('call:ended', () => {
    cleanupCall();
    document.getElementById('call-status-text').textContent = 'Call Ended';
    document.getElementById('call-sub-text').textContent = 'Thank you for calling!';
    document.getElementById('active-call-controls').style.display = 'none';
    document.getElementById('call-start-group').style.display = 'block';
    document.getElementById('call-timer-display').style.display = 'none';
    const av = document.getElementById('call-avatar');
    av.textContent = '📞'; av.classList.remove('in-call');
  });
  socket.on('call:rejected', () => {
    document.getElementById('call-status-text').textContent = 'No agents available';
    document.getElementById('call-sub-text').textContent = 'Please try again or use live chat';
    document.getElementById('request-call-btn').disabled = false;
  });

  appendBotMsg(`Hi ${customerName}! 👋 I'm the Nexus AI assistant. How can I help you today?`, false);
}

// ── Bot chat ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const message = input.value.trim();
  if (!message || isBotTyping) return;
  input.value = ''; input.style.height = 'auto';

  appendUserMsg(message);
  conversationHistory.push({ role: 'user', content: message });

  showTyping(); isBotTyping = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API_URL}/api/chat/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: conversationHistory }),
    });
    const data = await res.json();
    hideTyping(); isBotTyping = false;
    document.getElementById('send-btn').disabled = false;
    conversationHistory.push({ role: 'assistant', content: data.message });
    appendBotMsg(data.message, true);
    if (data.escalate) showEscalationBar();
  } catch (err) {
    hideTyping(); isBotTyping = false;
    document.getElementById('send-btn').disabled = false;
    appendBotMsg("I'm having connectivity issues. Please try again.", true);
  }
}

function appendUserMsg(text) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = 'msg user';
  const time = now();
  div.innerHTML = `<div class="msg-row"><div class="msg-bubble">${esc(text)}</div></div><div class="msg-time">${time}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendBotMsg(text, showResolved) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const time = now();
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar">✦</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    </div>
    <div class="msg-time">${time}</div>`;
  area.appendChild(div);

  if (showResolved) {
    setTimeout(() => showResolvedPrompt(area), 400);
  }

  area.scrollTop = area.scrollHeight;
}

function showResolvedPrompt(area) {
  // Remove any existing unresolved prompt
  const old = area.querySelector('.resolved-prompt');
  if (old) old.remove();

  const div = document.createElement('div');
  div.className = 'resolved-prompt';
  div.innerHTML = `
    <p>Did that answer your question?</p>
    <div class="resolved-btns">
      <button class="resolved-btn yes" onclick="handleResolved(true, this)">✓ Yes, thanks!</button>
      <button class="resolved-btn no" onclick="handleResolved(false, this)">✗ Not yet</button>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function handleResolved(resolved, btn) {
  const prompt = btn.closest('.resolved-prompt');
  if (resolved) {
    prompt.innerHTML = `<p style="color:var(--green);font-size:0.82rem;">✓ Great! Feel free to ask anything else.</p>`;
    hideEscalationBar();
  } else {
    prompt.innerHTML = `<p style="color:var(--muted);font-size:0.82rem;">No problem — you can ask another question or reach a live agent below.</p>`;
    showEscalationBar();
  }
}

function showEscalationBar() {
  if (escalationShown) return;
  escalationShown = true;
  document.getElementById('escalation-bar').classList.add('visible');
}

function hideEscalationBar() {
  escalationShown = false;
  document.getElementById('escalation-bar').classList.remove('visible');
}

let typingEl = null;
function showTyping() {
  const area = document.getElementById('messages-area');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(typingEl);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── Panel switching ───────────────────────────────────────────────────────────
function showLiveChat() {
  document.getElementById('bot-panel').style.display = 'none';
  document.getElementById('voice-panel').classList.remove('active');
  document.getElementById('live-panel').classList.add('active');
  if (socket && !liveChatSessionId) socket.emit('chat:request', {});
}

function showVoiceCall() {
  document.getElementById('bot-panel').style.display = 'none';
  document.getElementById('live-panel').classList.remove('active');
  document.getElementById('voice-panel').classList.add('active');
}

function backToBot() {
  document.getElementById('voice-panel').classList.remove('active');
  document.getElementById('live-panel').classList.remove('active');
  document.getElementById('bot-panel').style.display = 'flex';
}

// ── Live chat ─────────────────────────────────────────────────────────────────
function appendLiveMsg(type, text) {
  const area = document.getElementById('live-messages-area');
  const div = document.createElement('div');
  const time = now();
  if (type === 'system') {
    div.style.cssText = 'text-align:center;font-size:0.72rem;color:rgba(240,239,245,0.3);font-style:italic;padding:4px 0;';
    div.textContent = text;
  } else {
    div.className = `msg ${type}`;
    const isAgent = type === 'agent';
    div.innerHTML = `
      <div class="msg-row">
        ${isAgent ? `<div class="msg-avatar" style="background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16;font-size:0.7rem;font-weight:700;">A</div>` : ''}
        <div class="msg-bubble">${esc(text)}</div>
      </div>
      <div class="msg-time">${time}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function sendLiveMessage() {
  const input = document.getElementById('live-msg-input');
  const message = input.value.trim();
  if (!message || !liveChatSessionId) return;
  input.value = '';
  socket.emit('chat:message', { sessionId: liveChatSessionId, message, sender: 'customer' });
  appendLiveMsg('user', message);
}

function endLiveChat() {
  if (liveChatSessionId) socket.emit('chat:end', { sessionId: liveChatSessionId });
}

// ── Voice call ────────────────────────────────────────────────────────────────
async function requestVoiceCall() {
  if (!socket) { alert('Please wait for connection…'); return; }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch {
    alert('Microphone access is required for voice calls.');
    return;
  }
  document.getElementById('request-call-btn').disabled = true;
  document.getElementById('call-status-text').textContent = 'Requesting call…';
  socket.emit('call:request', {});
}

async function initiatePeerConnection() {
  const { iceServers } = await (await fetch(`${API_URL}/api/ice-servers`)).json();
  peerConnection = new RTCPeerConnection({ iceServers });
  if (localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  peerConnection.ontrack = e => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
  peerConnection.onicecandidate = ({ candidate }) => {
    if (candidate && socket) socket.emit('webrtc:ice-candidate', { callId, candidate, targetSocketId: null });
  };
  peerConnection.onconnectionstatechange = () => {
    if (peerConnection.connectionState === 'connected') socket.emit('call:active', { callId });
  };
  try {
    if (localStream?.getTracks().length > 0) {
      mediaRecorder = new MediaRecorder(new MediaStream(localStream.getTracks()), { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.start(1000);
    }
  } catch (e) { console.warn('Recording failed:', e); }
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('muted', isMuted);
  btn.textContent = isMuted ? '🔇' : '🎙️';
}

function endCall() {
  socket.emit('call:end', { callId });
  uploadRecording();
  cleanupCall();
}

async function uploadRecording() {
  if (!mediaRecorder || !recordedChunks.length || !callId) return;
  mediaRecorder.stop();
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const fd = new FormData();
  fd.append('recording', blob, `call-${callId}.webm`);
  try { await fetch(`${API_URL}/api/calls/${callId}/recording`, { method: 'POST', body: fd }); } catch {}
}

function cleanupCall() {
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
  if (peerConnection) { peerConnection.close(); peerConnection = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  callSeconds = 0; recordedChunks = []; mediaRecorder = null;
  document.getElementById('request-call-btn').disabled = false;
}

function startCallTimer() {
  callSeconds = 0;
  callTimerInterval = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
    const s = String(callSeconds % 60).padStart(2, '0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function now() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>
