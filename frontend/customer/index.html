<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0c0c10;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff5;
    --muted: rgba(240,239,245,0.45);
    --accent: #7c6dff;
    --red: #ff6b6b;
    --green: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; height: -webkit-fill-available; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* ── App shell ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
    background: var(--bg);
    position: relative;
  }

  /* Background glow */
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 400px 300px at 20% 10%, rgba(124,109,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 80% 90%, rgba(255,107,107,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .logo { display: flex; align-items: center; gap: 9px; }

  .logo-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #b06dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }

  .logo-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
  }

  .online-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--green);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
  }

  .online-pill .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Panels ── */
  .panel {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .panel.active { display: flex; }

  /* ── Messages ── */
  .msgs {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  .msgs::-webkit-scrollbar { display: none; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeUp 0.2s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: none; }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-row { display: flex; align-items: flex-end; gap: 7px; }
  .msg.user .msg-row { flex-direction: row-reverse; }

  .bot-av {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #b06dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }
  .msg.user .msg-time { text-align: right; }

  /* Typing */
  .typing-wrap { align-self: flex-start; }
  .typing-bubble {
    display: flex; align-items: center; gap: 4px;
    padding: 11px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }
  .td {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: tdBounce 1.2s infinite ease-in-out;
  }
  .td:nth-child(2) { animation-delay: 0.18s; }
  .td:nth-child(3) { animation-delay: 0.36s; }
  @keyframes tdBounce { 0%,80%,100%{transform:scale(0.65);opacity:0.35} 40%{transform:scale(1);opacity:1} }

  /* Resolved prompt */
  .resolved-wrap {
    align-self: flex-start;
    max-width: 90%;
    animation: fadeUp 0.2s ease-out;
  }

  .resolved-q {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .resolved-btns { display: flex; gap: 7px; flex-wrap: wrap; }

  .rbtn {
    padding: 7px 16px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .rbtn.yes {
    background: rgba(74,222,128,0.1);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.25);
  }
  .rbtn.yes:hover, .rbtn.yes:active { background: rgba(74,222,128,0.2); }

  .rbtn.no {
    background: rgba(255,107,107,0.1);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.25);
  }
  .rbtn.no:hover, .rbtn.no:active { background: rgba(255,107,107,0.2); }

  /* Escalation card in chat */
  .escalation-card {
    align-self: flex-start;
    max-width: 90%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 14px;
    animation: fadeUp 0.2s ease-out;
  }

  .escalation-card p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .esc-btns { display: flex; gap: 8px; flex-wrap: wrap; }

  .esc-btn {
    flex: 1;
    min-width: 120px;
    padding: 11px 14px;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all 0.15s;
  }

  .esc-btn.chat { background: var(--accent); color: white; }
  .esc-btn.chat:active { filter: brightness(1.15); }

  .esc-btn.voice {
    background: rgba(255,107,107,0.12);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .esc-btn.voice:active { background: rgba(255,107,107,0.22); }

  /* ── Input area ── */
  .input-wrap {
    flex-shrink: 0;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 16px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  .msg-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px; /* prevents iOS zoom */
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 22px;
    max-height: 88px;
    line-height: 1.5;
    padding: 2px 0;
  }

  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .send-btn:active { opacity: 0.8; }
  .send-btn:disabled { opacity: 0.3; }

  /* ── Live chat panel ── */
  .live-banner {
    flex-shrink: 0;
    padding: 9px 16px;
    font-size: 0.76rem;
    font-weight: 500;
    background: rgba(124,109,255,0.08);
    border-bottom: 1px solid rgba(124,109,255,0.15);
    color: rgba(160,148,255,0.9);
  }

  /* ── Voice panel ── */
  #voice-panel {
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 24px 20px;
  }

  .back-btn {
    align-self: flex-start;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    padding: 4px 0;
    display: flex; align-items: center; gap: 5px;
  }

  .call-avatar {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--red), #ff4d4d);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    animation: ringRed 2.5s infinite;
  }

  .call-avatar.active {
    background: linear-gradient(135deg, var(--green), #22c55e);
    animation: ringGreen 2.5s infinite;
  }

  @keyframes ringRed {
    0%{box-shadow:0 0 0 0 rgba(255,107,107,0.4)}
    70%{box-shadow:0 0 0 20px rgba(255,107,107,0)}
    100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}
  }

  @keyframes ringGreen {
    0%{box-shadow:0 0 0 0 rgba(74,222,128,0.4)}
    70%{box-shadow:0 0 0 20px rgba(74,222,128,0)}
    100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
  }

  .call-info { text-align: center; }
  .call-info h3 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; margin-bottom: 5px; }
  .call-info p { font-size: 0.82rem; color: var(--muted); }

  #call-timer {
    font-family: 'Instrument Serif', serif;
    font-size: 2.6rem;
    color: var(--green);
    letter-spacing: 0.04em;
  }

  .call-start-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 14px 28px;
    border-radius: 50px;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--red), #ff4d4d);
    color: white;
    box-shadow: 0 4px 18px rgba(255,107,107,0.3);
    transition: all 0.2s;
  }

  .call-start-btn:active { transform: scale(0.97); }
  .call-start-btn:disabled { opacity: 0.45; }

  .call-ctrl-row { display: flex; gap: 14px; }

  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.25rem;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
  }

  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn.mute { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); }
  .ctrl-btn.mute.muted { background: rgba(255,107,107,0.15); color: var(--red); }
  .ctrl-btn.end { background: #ef4444; color: white; }

  /* ── Name modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 22px;
    padding: 32px 24px;
    width: 100%;
    max-width: 340px;
    text-align: center;
    animation: popIn 0.25s ease-out;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  .modal-emoji { font-size: 2rem; margin-bottom: 12px; }
  .modal h2 { font-family: 'Instrument Serif', serif; font-size: 1.55rem; margin-bottom: 6px; }
  .modal p { font-size: 0.83rem; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    padding: 13px 15px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .start-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  .start-btn:active { filter: brightness(1.1); }

  audio { display: none; }

  /* system message */
  .sys-msg {
    text-align: center;
    font-size: 0.72rem;
    color: rgba(240,239,245,0.3);
    font-style: italic;
    padding: 2px 0;
  }
</style>
</head>
<body>

<!-- Modal -->
<div class="overlay" id="name-modal">
  <div class="modal">
    <div class="modal-emoji">👋</div>
    <h2>Welcome to Nexus</h2>
    <p>Tell us your name so we can personalise your experience.</p>
    <input class="name-input" id="name-input" placeholder="Your name…" autocomplete="given-name">
    <button class="start-btn" id="start-btn">Start Conversation →</button>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-name">Nexus Support</span>
    </div>
    <span class="online-pill"><span class="dot"></span> Online</span>
  </div>

  <!-- Bot panel -->
  <div class="panel active" id="bot-panel">
    <div class="msgs" id="msgs"></div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="msg-input" id="msg-input" placeholder="Ask me anything…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <!-- Live chat panel -->
  <div class="panel" id="live-panel">
    <div class="live-banner" id="live-banner">🔄 Connecting to an agent…</div>
    <div class="msgs" id="live-msgs"></div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="msg-input" id="live-input" placeholder="Message your agent…" rows="1"></textarea>
        <button class="send-btn" onclick="sendLiveMessage()">↑</button>
      </div>
      <button id="end-chat-btn" style="display:none;width:100%;margin-top:9px;padding:10px;background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);border-radius:10px;font-family:Outfit,sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;" onclick="endLiveChat()">End Chat Session</button>
    </div>
  </div>

  <!-- Voice panel -->
  <div class="panel" id="voice-panel">
    <button class="back-btn" onclick="showBot()">← Back to chat</button>
    <div class="call-avatar" id="call-avatar">📞</div>
    <div class="call-info">
      <h3 id="call-status">Ready to call</h3>
      <p id="call-sub">Speak directly with a live support agent</p>
    </div>
    <div id="call-timer-wrap" style="display:none"><div id="call-timer">00:00</div></div>
    <div id="queue-info" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 24px;text-align:center;">
      <span id="queue-pos" style="font-family:'Instrument Serif',serif;font-size:1.8rem;display:block">—</span>
      <span style="font-size:0.72rem;color:var(--muted)">Position in queue</span>
    </div>
    <div id="call-start">
      <button class="call-start-btn" id="call-btn" onclick="requestCall()">📞 Call a Live Agent</button>
    </div>
    <div class="call-ctrl-row" id="call-ctrls" style="display:none">
      <button class="ctrl-btn mute" id="mute-btn" onclick="toggleMute()">🎙️</button>
      <button class="ctrl-btn end" onclick="endCall()">📵</button>
    </div>
  </div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3001' : window.location.origin;

let socket, customerName = '', sessionId = null;
let history = [], botBusy = false, liveChatId = null;
let peerConn = null, localStream = null, callId = null;
let timerInterval = null, callSecs = 0, muted = false;
let recorder = null, chunks = [];
let awaitingFeedback = false;

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').onclick = startSession;
document.getElementById('name-input').onkeydown = e => { if (e.key === 'Enter') startSession(); };
document.getElementById('msg-input').onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};
document.getElementById('live-input').onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendLiveMessage(); }
};
document.getElementById('msg-input').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 88) + 'px';
};

function startSession() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { input.style.borderColor = '#ef4444'; return; }
  customerName = name;
  document.getElementById('name-modal').style.display = 'none';

  socket = io(API_URL, { transports: ['websocket', 'polling'] });
  socket.on('connect', () => socket.emit('register:customer', { name: customerName }));
  socket.on('registered', d => sessionId = d.sessionId);

  socket.on('chat:queued', ({ position }) => {
    document.getElementById('live-banner').textContent = `⏳ Queue position: ${position}`;
    liveMsg('system', `You're #${position} in queue. An agent will be with you shortly…`);
  });
  socket.on('chat:connected', ({ agentName, sessionId: sid }) => {
    liveChatId = sid;
    const b = document.getElementById('live-banner');
    b.textContent = `✅ Connected with ${agentName}`;
    b.style.cssText = 'padding:9px 16px;font-size:.76rem;font-weight:500;background:rgba(74,222,128,.08);border-bottom:1px solid rgba(74,222,128,.2);color:#4ade80;flex-shrink:0;';
    document.getElementById('end-chat-btn').style.display = 'block';
    liveMsg('system', `${agentName} joined the chat`);
  });
  socket.on('chat:message', m => { if (m.sender === 'agent') liveMsg('agent', m.text); });
  socket.on('chat:ended', () => {
    liveMsg('system', 'Chat session ended');
    document.getElementById('end-chat-btn').style.display = 'none';
  });

  socket.on('call:queued', ({ callId: c, position }) => {
    callId = c;
    document.getElementById('call-status').textContent = 'Waiting for an agent…';
    document.getElementById('call-sub').textContent = `Queue position: ${position}`;
    document.getElementById('queue-info').style.display = 'block';
    document.getElementById('queue-pos').textContent = position;
  });
  socket.on('call:accepted', async ({ agentName }) => {
    document.getElementById('call-status').textContent = `Connecting with ${agentName}…`;
    document.getElementById('queue-info').style.display = 'none';
    await initPeer();
  });
  socket.on('webrtc:offer', async ({ callId: c, offer, fromSocketId }) => {
    if (!peerConn) await initPeer();
    await peerConn.setRemoteDescription(new RTCSessionDescription(offer));
    const ans = await peerConn.createAnswer();
    await peerConn.setLocalDescription(ans);
    socket.emit('webrtc:answer', { callId: c, answer: ans, targetSocketId: fromSocketId });
  });
  socket.on('webrtc:answer', async ({ answer }) => {
    if (peerConn) await peerConn.setRemoteDescription(new RTCSessionDescription(answer));
  });
  socket.on('webrtc:ice-candidate', async ({ candidate }) => {
    if (peerConn && candidate) await peerConn.addIceCandidate(new RTCIceCandidate(candidate));
  });
  socket.on('call:active', () => {
    startTimer();
    document.getElementById('call-status').textContent = 'In Call';
    document.getElementById('call-sub').textContent = 'Connected with live agent';
    document.getElementById('call-start').style.display = 'none';
    document.getElementById('call-ctrls').style.display = 'flex';
    document.getElementById('call-timer-wrap').style.display = 'block';
    const av = document.getElementById('call-avatar');
    av.textContent = '🎙️'; av.classList.add('active');
  });
  socket.on('call:ended', () => {
    cleanupCall();
    document.getElementById('call-status').textContent = 'Call Ended';
    document.getElementById('call-sub').textContent = 'Thank you for calling!';
    document.getElementById('call-ctrls').style.display = 'none';
    document.getElementById('call-start').style.display = 'block';
    document.getElementById('call-timer-wrap').style.display = 'none';
    const av = document.getElementById('call-avatar');
    av.textContent = '📞'; av.classList.remove('active');
  });
  socket.on('call:rejected', () => {
    document.getElementById('call-status').textContent = 'No agents available';
    document.getElementById('call-sub').textContent = 'Please try again or use live chat';
    document.getElementById('call-btn').disabled = false;
  });

  botMsg(`Hi ${customerName}! 👋 I'm the Nexus AI assistant. How can I help you today?`, false);
}

// ── Bot ───────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || botBusy) return;

  // Check for yes/no feedback
  if (awaitingFeedback) {
    const lower = text.toLowerCase();
    const isYes = /^(yes|yeah|yep|yup|sure|ok|okay|resolved|done|thanks|thank you|👍)/.test(lower);
    const isNo  = /^(no|nope|not|nah|still|help|more|👎)/.test(lower);
    if (isYes) { inp.value = ''; inp.style.height = 'auto'; handleFeedback(true); return; }
    if (isNo)  { inp.value = ''; inp.style.height = 'auto'; handleFeedback(false); return; }
  }

  inp.value = ''; inp.style.height = 'auto';
  userMsg(text);
  history.push({ role: 'user', content: text });
  showTyping(); botBusy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch(`${API_URL}/api/chat/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });
    const d = await r.json();
    hideTyping(); botBusy = false;
    document.getElementById('send-btn').disabled = false;
    history.push({ role: 'assistant', content: d.message });
    botMsg(d.message, true);
    if (d.escalate) showEscalation();
  } catch {
    hideTyping(); botBusy = false;
    document.getElementById('send-btn').disabled = false;
    botMsg("I'm having connectivity issues. Please try again.", true);
  }
}

function userMsg(text) {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-row"><div class="bubble">${esc(text)}</div></div><div class="msg-time">${ts()}</div>`;
  area.appendChild(d); scroll(area);
}

function botMsg(text, showFeedback) {
  const area = document.getElementById('msgs');

  // Remove any existing feedback prompt
  const old = area.querySelector('.resolved-wrap');
  if (old) old.remove();
  awaitingFeedback = false;

  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="msg-row">
      <div class="bot-av">✦</div>
      <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="msg-time">${ts()}</div>`;
  area.appendChild(d);

  if (showFeedback) {
    setTimeout(() => addFeedbackPrompt(area), 350);
  }
  scroll(area);
}

function addFeedbackPrompt(area) {
  const d = document.createElement('div');
  d.className = 'resolved-wrap';
  d.innerHTML = `
    <div class="resolved-q">Did that answer your question?</div>
    <div class="resolved-btns">
      <button class="rbtn yes" onclick="handleFeedback(true)">✓ Yes, thanks!</button>
      <button class="rbtn no" onclick="handleFeedback(false)">✗ Not yet</button>
    </div>`;
  area.appendChild(d);
  awaitingFeedback = true;
  scroll(area);
}

function handleFeedback(resolved) {
  const area = document.getElementById('msgs');
  const prompt = area.querySelector('.resolved-wrap');
  awaitingFeedback = false;
  if (resolved) {
    if (prompt) {
      prompt.innerHTML = `<div style="font-size:0.78rem;color:var(--green);padding:2px 0 4px;">✓ Great! Feel free to ask anything else.</div>`;
    }
  } else {
    if (prompt) prompt.remove();
    showEscalation();
  }
}

function showEscalation() {
  const area = document.getElementById('msgs');
  // Don't add duplicate
  if (area.querySelector('.escalation-card')) return;
  const d = document.createElement('div');
  d.className = 'escalation-card';
  d.innerHTML = `
    <p>No problem — let's connect you with a real person.</p>
    <div class="esc-btns">
      <button class="esc-btn chat" onclick="goLiveChat()">💬 Live Chat</button>
      <button class="esc-btn voice" onclick="goVoiceCall()">📞 Call a Live Agent</button>
    </div>`;
  area.appendChild(d);
  scroll(area);
}

let typingEl = null;
function showTyping() {
  const area = document.getElementById('msgs');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `<div class="typing-bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  area.appendChild(typingEl); scroll(area);
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── Panel nav ─────────────────────────────────────────────────────────────────
function goLiveChat() {
  showPanel('live-panel');
  if (socket && !liveChatId) socket.emit('chat:request', {});
}

function goVoiceCall() {
  showPanel('voice-panel');
  // Auto-trigger call immediately
  setTimeout(() => requestCall(), 300);
}

function showBot() { showPanel('bot-panel'); }

function showPanel(id) {
  ['bot-panel','live-panel','voice-panel'].forEach(p => {
    document.getElementById(p).classList.toggle('active', p === id);
  });
}

// ── Live chat ─────────────────────────────────────────────────────────────────
function liveMsg(type, text) {
  const area = document.getElementById('live-msgs');
  const d = document.createElement('div');
  if (type === 'system') {
    d.className = 'sys-msg';
    d.textContent = text;
  } else {
    d.className = `msg ${type}`;
    const isAgent = type === 'agent';
    d.innerHTML = `
      <div class="msg-row">
        ${isAgent ? `<div class="bot-av" style="background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16;font-size:0.65rem;font-weight:700;">A</div>` : ''}
        <div class="bubble">${esc(text)}</div>
      </div>
      <div class="msg-time">${ts()}</div>`;
  }
  area.appendChild(d); scroll(area);
}

function sendLiveMessage() {
  const inp = document.getElementById('live-input');
  const text = inp.value.trim();
  if (!text || !liveChatId) return;
  inp.value = '';
  socket.emit('chat:message', { sessionId: liveChatId, message: text, sender: 'customer' });
  liveMsg('user', text);
}

function endLiveChat() {
  if (liveChatId) socket.emit('chat:end', { sessionId: liveChatId });
}

// ── Voice ─────────────────────────────────────────────────────────────────────
async function requestCall() {
  if (!socket) return;
  const btn = document.getElementById('call-btn');
  if (btn.disabled) return;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch {
    alert('Microphone access is required for voice calls.');
    return;
  }
  btn.disabled = true;
  document.getElementById('call-status').textContent = 'Requesting call…';
  socket.emit('call:request', {});
}

async function initPeer() {
  const { iceServers } = await (await fetch(`${API_URL}/api/ice-servers`)).json();
  peerConn = new RTCPeerConnection({ iceServers });
  if (localStream) localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));
  peerConn.ontrack = e => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
  peerConn.onicecandidate = ({ candidate }) => {
    if (candidate && socket) socket.emit('webrtc:ice-candidate', { callId, candidate, targetSocketId: null });
  };
  peerConn.onconnectionstatechange = () => {
    if (peerConn.connectionState === 'connected') socket.emit('call:active', { callId });
  };
  try {
    if (localStream?.getTracks().length) {
      recorder = new MediaRecorder(new MediaStream(localStream.getTracks()), { mimeType: 'audio/webm' });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.start(1000);
    }
  } catch {}
}

function toggleMute() {
  muted = !muted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('muted', muted);
  btn.textContent = muted ? '🔇' : '🎙️';
}

function endCall() {
  socket.emit('call:end', { callId });
  uploadRec(); cleanupCall();
}

async function uploadRec() {
  if (!recorder || !chunks.length || !callId) return;
  recorder.stop();
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const fd = new FormData();
  fd.append('recording', blob, `call-${callId}.webm`);
  try { await fetch(`${API_URL}/api/calls/${callId}/recording`, { method: 'POST', body: fd }); } catch {}
}

function cleanupCall() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (peerConn) { peerConn.close(); peerConn = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  callSecs = 0; chunks = []; recorder = null;
  document.getElementById('call-btn').disabled = false;
}

function startTimer() {
  callSecs = 0;
  timerInterval = setInterval(() => {
    callSecs++;
    const m = String(Math.floor(callSecs / 60)).padStart(2,'0');
    const s = String(callSecs % 60).padStart(2,'0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function ts() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function scroll(el) { requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; }); }
</script>
